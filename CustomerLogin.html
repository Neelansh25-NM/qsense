<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-Sense | Login</title>
       <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">



    <link rel="stylesheet" href="style.css">
    </head>
<body>

    <header class="navbar">
        <div class="logo">
            <span class="icon">🍴</span>
            <h1>Q-Sense</h1>
        </div>
        <nav>
            <a href="#">Home</a>
            <a href="locations.html">Location</a>
            <a href="CustomerReservation.html">Reservation</a>
            
            <div class="user-profile">
                <div class="avatar"></div>
                <span>Guest</span>
            </div>
        </nav>
    </header>

    <main class="login-container">
        <div class="login-card">
            <h2>Welcome to Q-Sense</h2>
            <form id = "login">
                <div class="input-group">
                    <input type="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Password" required>
                </div>
                <div class="action-row">
                    <button type="submit" class="login-btn" style = "font-size: 10px;"><b>Log In</b></button>
                    <div class="links">
                        <a href="#">Forgot Password?</a>
                        <a href="CustomerSignUp.html">Don't have an account? Sign Up instead</a>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Q-Sense Inc. &bull; <a href="#">Privacy</a> &bull; <a href="#">Terms</a></p>
    </footer>

    <script>
document.getElementById("login").addEventListener("submit", async function(e){

    e.preventDefault();

    const email = document.querySelector('input[type="email"]').value;
    const password = document.querySelector('input[type="password"]').value;
try {
    const res = await fetch("http://localhost:5000/api/users/login",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({email,password})
    });

   const data = await res.json();
   

    if(res.ok){
   
    localStorage.setItem("temp_customer_id", data.user);
    localStorage.setItem("temp_email", email); 
    localStorage.setItem("temp_role", "customer"); 

    console.log("Password correct! Requesting OTP...");
    
    
    const otpRes = await fetch("http://localhost:5000/api/send-otp", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        
        body: JSON.stringify({ email: email, role: 'customer' }) 
    });

    const otpData = await otpRes.json();

    if (otpData.success) {
       
        window.location.href = "OtpVerification.html";
    } else {
        alert("Failed to send OTP email. Please try again.");
                    loginBtn.innerHTML = originalBtnText;
                    loginBtn.disabled = false;
    }

} else {
    alert(data.message);
    loginBtn.innerHTML = originalBtnText;
    loginBtn.disabled = false;
}

} catch (error) {
            console.error("Login Error:", error);
            alert("A network error occurred. Please check if the server is running.");
            loginBtn.innerHTML = originalBtnText;
            loginBtn.disabled = false;
        }

});
</script>
</body>
</html>
