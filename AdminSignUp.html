<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-Sense | Admin Sign Up</title>
   <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <span class="icon">🍴</span>
            <h1>Q-Sense</h1>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <div class="admin-profile">
                <a href="AdminLogin.html" class="login-link">Sign In</a>
            </div>
        </nav>
    </header>

    <main class="login-container">
        <div class="login-card">
            <h2>Admin Account Creation</h2>
            <form id="signup">
                
                <div class="input-group">
                    <input type="text" id="name" placeholder="Full Name" required>
                </div>
                
                <div class="input-group">
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                
                <div class="input-group">
                    <input type="tel" id="phone" placeholder="Phone Number" required>
                </div>

                <div class="input-group">
                    <select id="restaurant_id" required>
                        <option value="">Loading restaurants...</option>
                        </select>
                </div>

                <div class="input-group">
                    <select id="role" required>
                        <option value="">Select your role...</option>
                        <option value="staff">Staff</option>
                        <option value="manager">Manager</option>
                    </select>
                </div>

                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                
                <div class="input-group">
                    <input type="password" id="confirm_password" placeholder="Confirm Password" required>
                </div>

                <div class="action-row">
                    <button type="submit" class="login-btn full-width">Sign Up</button>
                    <div class="links" style="margin-top: 15px; text-align: center;">
                        <a href="AdminLogin.html">Already have an account? Log In</a>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Q-Sense Inc. &bull; <a href="#">Privacy</a> &bull; <a href="#">Terms</a></p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", async function() {
            try {
                const response = await fetch("http://localhost:5000/api/restaurant");
                const restaurants = await response.json();
                
                const selectElement = document.getElementById("restaurant_id");
                selectElement.innerHTML = '<option value="">Select your Restaurant...</option>';
                
                restaurants.forEach(rest => {
                    const option = document.createElement("option");
                    option.value = rest.restaurant_id;
                    option.textContent = `${rest.name} (${rest.location})`;
                    selectElement.appendChild(option);
                });
            } catch (error) {
                console.error("Error fetching restaurants:", error);
                document.getElementById("restaurant_id").innerHTML = '<option value="">Error loading restaurants</option>';
            }
        });

            document.getElementById("signup").addEventListener("submit", async function(e){
            e.preventDefault();

            
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const phone = document.getElementById("phone").value;
            const restaurant_id = document.getElementById("restaurant_id").value;
            const role = document.getElementById("role").value;
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirm_password").value;

            if(password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            try {
                const res = await fetch("http://localhost:5000/api/admin/register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                   
                    body: JSON.stringify({ restaurant_id, name, email, phone, password, role })
                });

                const data = await res.json();

                if(res.ok) {
                    alert("Account created successfully. Please log in.");
                    window.location.href = "AdminLogin.html";
                } else {
                    alert("Error: " + (data.message || data.error));
                }
            } catch (error) {
                console.error("Signup error:", error);
                alert("An error occurred during sign up.");
            }
        });
    </script>

</body>
</html>
